[mypy]
python_version = 3.14
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
plugins = mypy_django_plugin.main


[mypy.plugins.django-stubs]
django_settings_module = investor_app.settings

# Ignore missing imports for libraries without type stubs
[mypy-numpy_financial.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-bs4]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-numpy]
ignore_missing_imports = True

[mypy-pypdf]
ignore_missing_imports = True

[mypy-environ.*]
ignore_missing_imports = True

[mypy-pytest]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-rest_framework]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True

[mypy-structlog]
ignore_missing_imports = True

[mypy-httpx]
ignore_missing_imports = True

[mypy-structlog]
ignore_missing_imports = True

# Pre-existing type errors — suppress until files are refactored.
[mypy-core.services.market_scoring]
ignore_errors = True

[mypy-core.services.portfolio]
ignore_errors = True

[mypy-core.services.property_service]
ignore_errors = True

[mypy-core.views]
ignore_errors = True

[mypy-core.api_views]
ignore_errors = True
