[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = investor_app.settings

# Ignore missing imports for libraries without type stubs
[mypy-numpy_financial.*]
ignore_missing_imports = True

[mypy-pytest_bdd.*]
ignore_missing_imports = True

[mypy-environ.*]
ignore_missing_imports = True

# numpy 2.x stubs use Python 3.12 `type` statement syntax which requires
# python_version = 3.12 in mypy. Skipping avoids false positives from numpy internals.
[mypy-numpy]
follow_imports = skip

[mypy-numpy.*]
follow_imports = skip

# Pre-existing type errors in files not touched by this PR — suppress until fixed separately.
[mypy-core.services.market_scoring]
ignore_errors = True

[mypy-core.services.portfolio]
ignore_errors = True

[mypy-core.services.property_service]
ignore_errors = True

[mypy-core.views]
ignore_errors = True
