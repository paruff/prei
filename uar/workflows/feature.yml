workflow: feature
steps:
  - agent: planner
    action: define_task_graph
    output: task_list, risk_flags
  - agent: coder
    action: implement
    rules: [service_boundaries, decimal_money, tests_required]
  - agent: reviewer
    action: validate
    checks: [boundaries, currency, tests, secrets, migrations]
  - human: approve
    required_for: [migrations, auth_changes, new_external_deps]
  - action: run_verification
    command: make check
  - action: create_pr
    target: main
    requires: human_approval
