<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}Investor App{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/css/theme.css" />
    <style>
      .notification-status-dot {
        top: 8px;
        right: 8px;
      }
    </style>
    <!-- Prevent flash of wrong theme (FOUC) — apply before render -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem("prei-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-bs-theme", t);
          } else if (t === "system" || !t) {
            var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.setAttribute("data-bs-theme", dark ? "dark" : "light");
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">prei</a>
        <div class="navbar-nav ms-auto">
          {% if user.is_authenticated %}
          <div class="nav-item dropdown">
            <button
              id="notificationBell"
              type="button"
              class="btn nav-link border-0 bg-transparent text-white position-relative"
              aria-expanded="false"
              aria-label="Notifications"
            >
              <span aria-hidden="true">🔔</span>
              <span
                id="notificationUnreadBadge"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"
              >0</span>
            </button>
            <span id="notificationConnectionStatus" class="notification-status-dot position-absolute translate-middle p-1 border border-light rounded-circle bg-danger" aria-live="polite" aria-label="Notification connection failed"></span>
            <div
              id="notificationDropdown"
              class="dropdown-menu dropdown-menu-end p-0"
              style="width: 360px;"
            >
              <div class="px-3 py-2 border-bottom fw-semibold">Notifications</div>
              <div id="notificationList" class="list-group list-group-flush"></div>
            </div>
          </div>
          {% endif %}
          <!-- Theme toggle -->
          <div class="nav-item dropdown">
            <button
              id="theme-toggle"
              type="button"
              class="btn nav-link border-0 bg-transparent text-white"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              aria-label="Toggle dark mode"
            >
              <span class="theme-icon" aria-hidden="true">🌙</span>
            </button>
            <ul id="theme-dropdown" class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#" data-theme-value="light">Light</a></li>
              <li><a class="dropdown-item" href="#" data-theme-value="dark">Dark</a></li>
              <li><a class="dropdown-item" href="#" data-theme-value="system">System</a></li>
            </ul>
          </div>
          <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="nav-link" href="{% url 'property_list' %}">Properties</a>
          <a class="nav-link" href="{% url 'property_add' %}">Add Property</a>
          <a class="nav-link" href="{% url 'vrm_properties_list' %}">VRM Properties</a>
          <a class="nav-link" href="{% url 'investment_targets_edit' %}">Targets</a>
          <a class="nav-link" href="{% url 'logout' %}">Logout</a>
        </div>
      </div>
    </nav>
    <main class="container pb-4">
      {% block content %}{% endblock %}
    </main>
    {% if user.is_authenticated %}
    <script src="/static/js/notifications.js"></script>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script src="/static/js/theme.js"></script>
  </body>
</html>
