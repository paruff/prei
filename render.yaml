services:
  - type: web
    name: prei-web
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT investor_app.asgi:application
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: investor_app.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        # Set in Render dashboard or via Blueprint environment setup.
        sync: false
      - key: ALLOWED_HOSTS
        # Comma-separated production hosts, set per environment.
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prei-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: prei-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: prei-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: prei-redis
          property: connectionString

  - type: worker
    name: prei-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A investor_app worker -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: investor_app.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        # Set in Render dashboard or via Blueprint environment setup.
        sync: false
      - key: ALLOWED_HOSTS
        # Comma-separated production hosts, set per environment.
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prei-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: prei-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: prei-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: prei-redis
          property: connectionString

  - type: worker
    name: prei-scheduler
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A investor_app beat -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: investor_app.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        # Set in Render dashboard or via Blueprint environment setup.
        sync: false
      - key: ALLOWED_HOSTS
        # Comma-separated production hosts, set per environment.
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prei-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: prei-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: prei-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: prei-redis
          property: connectionString

  - type: redis
    name: prei-redis

  ipAllowList:
    - source: 0.0.0.0/0
      description: Allow Render services

databases:
  - name: prei-db
    databaseName: prei
    user: prei
