services:
  - type: web
    name: prei-web
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn investor_app.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/
    # Post-deploy: trigger GitHub smoke-test workflow via repository_dispatch.
    # Requires GITHUB_DISPATCH_TOKEN in Render env vars (GitHub PAT with repo scope).
    postDeployCommand: |
      if [ -n "$GITHUB_DISPATCH_TOKEN" ]; then
        curl -sf -X POST https://api.github.com/repos/paruff/prei/dispatches \
          -H "Authorization: Bearer $GITHUB_DISPATCH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"event_type\":\"deploy-complete\",\"client_payload\":{\"url\":\"$RENDER_EXTERNAL_URL\"}}" \
          && echo "Smoke test triggered" \
          || echo "(non-fatal) Smoke test trigger failed"
      else
        echo "GITHUB_DISPATCH_TOKEN not set — skipping smoke test trigger"
      fi
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: investor_app.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        # Set in Render dashboard or via Blueprint environment setup.
        sync: false
      - key: ALLOWED_HOSTS
        # Comma-separated production hosts, set per environment.
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prei-db
          property: connectionString
      - key: GITHUB_DISPATCH_TOKEN
        # GitHub PAT with repo scope — enables post-deploy smoke test triggers.
        # Set in Render dashboard. Optional; deploy succeeds without it.
        sync: false

databases:
  - name: prei-db
    databaseName: prei
    user: prei
