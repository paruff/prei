services:
  - type: web
    name: prei-web
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn investor_app.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: investor_app.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        # Set in Render dashboard or via Blueprint environment setup.
        sync: false
      - key: ALLOWED_HOSTS
        # Comma-separated production hosts, set per environment.
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prei-db
          property: connectionString

databases:
  - name: prei-db
    databaseName: prei
    user: prei
