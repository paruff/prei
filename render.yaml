# render.yaml — Render deployment configuration for prei
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: prei
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prei-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
    healthCheckPath: /api/health/

databases:
  - name: prei-db
    plan: free
    databaseName: prei
    user: prei
