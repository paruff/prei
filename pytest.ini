[pytest]
DJANGO_SETTINGS_MODULE = investor_app.settings_test
python_files = tests.py test_*.py *_tests.py
addopts = --reruns 1 --reruns-delay 5
markers =
    e2e: End-to-end tests that simulate full pipeline flow (skipped in CI)
    integration: Tests that hit live external APIs (skipped if API keys not set)
    slow: Tests that take longer than usual to complete (e.g., live API calls)
