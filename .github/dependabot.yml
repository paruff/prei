# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly    # bumps FROM python:3.14-slim automatically
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly    # keeps actions/checkout, docker/build-push-action, etc. up to date
