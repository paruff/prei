name: Tier 2 Governance — Build, Publish & Attest

on:
  push:
    branches: [main]
    tags: ["v[0-9]*"]

concurrency:
  group: tier-2-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    name: "🏗️ Tier 2 — Build Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Checkout
        uses: actions/checkout@v7
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=PREI - Real Estate Investment Analyzer
            org.opencontainers.image.description=Django app for RE investment KPIs
            org.opencontainers.image.vendor=paruff
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version string
        id: version
        run: |
          # Tag push → use tag name; branch push → use short SHA
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="0.0.0-dev+sha-${GITHUB_SHA::7}"
          fi
          BUILD_DATE=$(date -u +%y.%m.%d.%H)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build-date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
            BUILD_DATE=${{ steps.version.outputs.build-date }}
            BRANCH=${{ steps.version.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  live-test:
    name: "🧪 Tier 2 — Live Acceptance Test"
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run container and acceptance tests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
        run: |
          set -e
          echo "=== Starting container ==="
          docker run -d \
            --name prei-live-test \
            -p 8000:8000 \
            -e SECRET_KEY=ci-live-test-key-$(date +%s) \
            -e DJANGO_ENV=development \
            -e DEBUG=True \
            -e ALLOWED_HOSTS=localhost,127.0.0.1 \
            -e DATABASE_URL=sqlite:////tmp/live_test.db \
            -e RUN_MIGRATIONS=1 \
            -e SKIP_SEED=1 \
            -e SKIP_COLLECTSTATIC=1 \
            "$IMAGE"

          echo "=== Checking container is running ==="
          sleep 3
          CID=$(docker ps -q -f name=prei-live-test)
          if [ -z "$CID" ]; then
            echo "::error::Container exited immediately"
            docker logs prei-live-test || true
            docker rm prei-live-test 2>/dev/null || true
            exit 1
          fi

          echo "=== Waiting for healthy (up to 180s) ==="
          HEALTHY=0
          for i in $(seq 1 90); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/health/ 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Healthy after ~$((i * 2))s"
              HEALTHY=1
              break
            fi
            sleep 2
          done

          if [ "$HEALTHY" != "1" ]; then
            echo "::error::Container never became healthy within 180s"
            echo "=== Container logs ==="
            docker logs prei-live-test || true
            echo "=== End container logs ==="
            exit 1
          fi

          # Clean up on success
          echo "=== Tests complete, stopping container ==="
          docker stop prei-live-test 2>/dev/null || true
          docker rm prei-live-test 2>/dev/null || true

          echo ""
          echo "=== Live Acceptance Tests ==="

          echo -n "1. Health check: "
          curl -sf http://localhost:8000/health/ | python3 -m json.tool | grep -q '"status": "ok"' && echo "PASS" || { echo "FAIL"; exit 1; }

          echo -n "2. Login page: "
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/accounts/login/)
          [ "$STATUS" = "200" ] && echo "PASS ($STATUS)" || { echo "FAIL ($STATUS)"; exit 1; }

          echo -n "3. Listings API: "
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/listings/)
          [ "$STATUS" = "200" ] && echo "PASS ($STATUS)" || echo "WARN ($STATUS)"

          echo -n "4. Growth areas API: "
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/api/v1/real-estate/growth-areas")
          [ "$STATUS" = "200" ] && echo "PASS ($STATUS)" || echo "WARN ($STATUS)"

          echo -n "5. Foreclosures API: "
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/foreclosures)
          [ "$STATUS" = "200" ] && echo "PASS ($STATUS)" || echo "WARN ($STATUS)"

          echo -n "6. Discovery page: "
          curl -sf -o /dev/null -w "PASS (%{http_code})" http://localhost:8000/discovery/; echo ""

          echo -n "7. Pipeline screener: "
          curl -sf -o /dev/null -w "PASS (%{http_code})" http://localhost:8000/pipeline/screener/; echo ""

          echo -n "8. Health API: "
          curl -sf -o /dev/null -w "PASS (%{http_code})" http://localhost:8000/api/health/; echo ""

          echo -n "9. Static CSS: "
          curl -sf -o /dev/null -w "PASS (%{http_code})" http://localhost:8000/static/css/base.css; echo ""

          echo ""
          echo "=== All live acceptance tests passed ==="

          docker stop prei-live-test 2>/dev/null || true
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  scan-image:
    name: "🛡️ Tier 2 — Scan Image"
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Trivy — block HIGH/CRITICAL CVEs with fixes
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
      - name: Trivy — upload SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
          format: sarif
          output: trivy-tier-2.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-tier-2.sarif
          category: trivy-tier-2-scan
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  publish:
    name: "📤 Tier 2 — Publish"
    needs: [build-image, scan-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=PREI - Real Estate Investment Analyzer
            org.opencontainers.image.description=Django app for RE investment KPIs
            org.opencontainers.image.vendor=paruff
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish tags from built image
        env:
          SOURCE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
          TARGET_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mapfile -t tags <<<"$TARGET_TAGS"
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No target tags were generated."
            exit 1
          fi
          args=()
          for tag in "${tags[@]}"; do
            args+=("-t" "$tag")
          done
          docker buildx imagetools create "${args[@]}" "$SOURCE_IMAGE"
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  gitops-deploy:
    name: "🚀 Tier 2 — GitOps Deploy"
    needs: [publish, live-test, scan-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    if: vars.GITOPS_REPO != ''
    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      GITOPS_MANIFEST_PATH: ${{ vars.GITOPS_MANIFEST_PATH || 'overlays/production/kustomization.yaml' }}
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
          echo "image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}"
      - name: Checkout GitOps repo
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_DEPLOY_KEY || secrets.GITHUB_TOKEN }}
          path: gitops
      - name: Update image manifest
        working-directory: gitops
        run: |
          MANIFEST="${{ env.GITOPS_MANIFEST_PATH }}"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest not found: $MANIFEST"
            exit 1
          fi
          # Update the newTag or newName in kustomization.yaml
          # Pattern: replace existing tag for ghcr.io/paruff/prei
          sed -i "s|\(ghcr\.io/paruff/prei\):.*|\1@${{ needs.build-image.outputs.image-digest }}|g" "$MANIFEST"
          # If the manifest uses images[].newTag format
          sed -i "s|\(newTag:\).*|\1 sha-${{ github.sha }}|" "$MANIFEST" 2>/dev/null || true
          echo "Updated manifest:"
          cat "$MANIFEST"
      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.GITOPS_MANIFEST_PATH }}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "deploy: update image to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} [skip ci]"
            git push
            echo "✅ GitOps manifest updated and pushed"
          fi
      - name: Trigger post-deployment smoke
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: deploy-complete
          client-payload: >
            {"url":"${{ vars.DEPLOY_URL || '' }}","image":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}","sha":"${{ github.sha }}"}
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  attest:
    name: "🧾 Tier 2 — Attest"
    needs: [publish, build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.build-image.outputs.image-digest }}
          push-to-registry: true
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
