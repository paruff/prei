name: Tier 2 Governance — Build, Publish & Attest

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: tier-2-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    name: "🏗️ Tier 2 — Build Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image for validation (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:tier-2-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  publish:
    name: "📤 Tier 2 — Publish"
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=PREI - Real Estate Investment Analyzer
            org.opencontainers.image.description=Django app for RE investment KPIs
            org.opencontainers.image.vendor=paruff
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # The attestation is emitted by the dedicated Tier 2 "attest" job below.
          provenance: false
          sbom: true
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  attest:
    name: "🧾 Tier 2 — Attest"
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.publish.outputs.image-digest }}
          push-to-registry: true
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
