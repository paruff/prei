name: Tier 1 Governance — PR Gates

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: tier-1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: "🔍 Tier 1 — Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install dependencies
        run: pip install ruff black
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  tests:
    name: "🧪 Tier 1 — Tests"
    runs-on: ubuntu-latest
    env:
      DEBUG: "False"
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install dependencies
        run: pip install -r requirements.txt coverage
      - name: Collect static files
        run: python manage.py collectstatic --noinput
      - name: Run tests
        run: |
          export SECRET_KEY=$(python -c 'import secrets; print(secrets.token_hex(50))')
          coverage run -m pytest -q --tb=short
          coverage report --fail-under=80
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  typecheck:
    name: "🔷 Tier 1 — Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Mypy
        run: mypy core/ investor_app/finance/ --ignore-missing-imports
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  tier-1-summary:
    name: "✅ Tier 1 Complete"
    needs: [lint, tests, typecheck]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Check Tier 1 gates
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.tests.result }}" != "success" ] ||
             [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ Tier 1 governance failed"
            exit 1
          fi
          echo "✅ Tier 1 governance passed"
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
