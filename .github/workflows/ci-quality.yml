name: Tier 1 Governance — PR Gates

on:
  pull_request:
    branches: [main, develop]
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: tier-1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-title:
    name: "📝 PR Title — Conventional Commit"
    runs-on: ubuntu-latest
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Validate PR title
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Skip validation for WIP/draft PRs
            const wipPrefix = /^(WIP:|\[WIP\])\s/i;
            if (wipPrefix.test(title)) {
              core.info(`WIP prefix detected, skipping validation for: "${title}"`);
              return;
            }

            const types = ['feat', 'fix', 'docs', 'style', 'refactor', 'perf', 'test', 'build', 'ci', 'chore', 'revert'];
            // Conventional Commits: type(optional-scope)!: subject
            // subject: start with lowercase letter, then any text
            const pattern = new RegExp(
              `^(${types.join('|')})(\\([a-z0-9/._-]+\\))?!?:\\s[a-z].+`
            );

            if (!pattern.test(title)) {
              const msg =
                `PR title "${title}" does not follow Conventional Commits format.\n\n` +
                `Expected: type(optional-scope): description\n` +
                `Allowed types: ${types.join(', ')}\n\n` +
                `The subject must start with a lowercase letter, per ` +
                `the Conventional Commits spec.\n\n` +
                `Examples:\n  "feat(ui): add button"\n  "fix: resolve timeout"\n  ` +
                `"chore(ci): bump dependency version"`;
              core.setFailed(msg);
            } else {
              core.info(`PR title "${title}" follows Conventional Commits format.`);
            }
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  lint:
    name: "🔍 Tier 1 — Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install dependencies
        run: pip install ruff bandit
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Bandit (Python security lint)
        run: bandit -r core/ investor_app/ -x ".venv,migrations" -c .bandit -f txt
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  secrets:
    name: "🔑 Tier 1 — Secrets Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  tests:
    name: "🧪 Tier 1 — Tests"
    runs-on: ubuntu-latest
    env:
      DEBUG: "False"
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev
      - name: Install dependencies
        run: pip install -r requirements.txt coverage
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Django system checks
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: investor_app.settings
          SECRET_KEY: ci-check-secret-key
          DEBUG: "True"
          DATABASE_URL: sqlite:///tmp/test_db.sqlite3
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --noinput
        env:
          DJANGO_SETTINGS_MODULE: investor_app.settings
          SECRET_KEY: ci-check-secret-key
          DEBUG: "True"
          DATABASE_URL: sqlite:///tmp/test_db.sqlite3
      - name: Collect static files
        run: python manage.py collectstatic --noinput
      - name: Run tests
        run: |
          export SECRET_KEY=$(python -c 'import secrets; print(secrets.token_hex(50))')
          coverage run -m pytest -q --tb=short
          coverage report --fail-under=80
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  typecheck:
    name: "🔷 Tier 1 — Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Mypy
        run: mypy core/ investor_app/finance/ --ignore-missing-imports
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

  tier-1-summary:
    name: "✅ Tier 1 Complete"
    needs: [pr-title, lint, secrets, tests, typecheck]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
      - name: Check Tier 1 gates
        run: |
          if [ "${{ needs.pr-title.result }}" != "success" ] ||
             [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.secrets.result }}" != "success" ] ||
             [ "${{ needs.tests.result }}" != "success" ] ||
             [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ Tier 1 governance failed"
            exit 1
          fi
          echo "✅ Tier 1 governance passed"
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
