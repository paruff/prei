name: Test & Lint

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-lint:
    name: test-and-lint
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: investor_app.settings_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: job-start
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Cairo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev build-essential

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests with coverage
        run: |
          set -o pipefail
          coverage run -m pytest --tb=short -q 2>&1 | tee pytest-output.txt

      - name: "Coverage report (gate: 20%)"
        run: coverage report --fail-under=20 --skip-covered

      - name: Lint
        run: ruff check .

      - name: Upload pytest output
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: job-finish
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
