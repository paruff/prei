name: Create GitHub Release

# Triggers when a semver tag (v1.2.3) is pushed.
# Produces a GitHub Release with auto-generated notes from merged PRs.
# The docker-publish workflow handles the GHCR image; this handles the release page.

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required to create the release

jobs:
  release:
    name: "📦 GitHub Release"
    runs-on: ubuntu-latest

    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so --generate-notes can link PRs

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag

      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha: ${{ github.sha }}"
