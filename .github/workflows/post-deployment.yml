name: Post-Deployment — Smoke Tests

on:
  repository_dispatch:
    types: [deploy-complete]
  workflow_dispatch:
    inputs:
      url:
        description: "Deployment URL to smoke-test"
        required: true
        default: "http://localhost:8000"

concurrency:
  group: post-deploy-${{ github.event.client_payload.url || inputs.url }}
  cancel-in-progress: false

jobs:
  smoke:
    name: "💨 Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target URL
        id: url
        run: |
          TARGET="${{ github.event.client_payload.url || inputs.url }}"
          # Strip trailing slash for consistent URL construction
          TARGET="${TARGET%/}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Testing against: $TARGET"

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.target }}/health/")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: API — listings
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.target }}/api/listings/")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/listings/ returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /api/listings/ OK"

      - name: API — growth areas
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.target }}/api/v1/real-estate/growth-areas")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/v1/real-estate/growth-areas returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /api/v1/real-estate/growth-areas OK"

      - name: API — foreclosures
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.target }}/api/v1/foreclosures")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/v1/foreclosures returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /api/v1/foreclosures OK"

      - name: Summary
        if: always()
        run: |
          echo "── Smoke test complete ──"
          echo "  Target: ${{ steps.url.outputs.target }}"

  rollback:
    name: "🔄 Rollback on Failure"
    needs: smoke
    if: failure() && vars.GITOPS_REPO != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      GITOPS_MANIFEST_PATH: ${{ vars.GITOPS_MANIFEST_PATH || 'overlays/production/kustomization.yaml' }}
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Rollback triggered — smoke tests failed"
          echo "GitOps repo: ${{ env.GITOPS_REPO }}"
      - name: Checkout GitOps repo
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_DEPLOY_KEY || secrets.GITHUB_TOKEN }}
          path: gitops
      - name: Revert to previous commit
        working-directory: gitops
        run: |
          PREV_SHA=$(git rev-parse HEAD~1)
          if [ -z "$PREV_SHA" ]; then
            echo "::error::No previous commit to rollback to"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert --no-edit "$PREV_SHA..HEAD"
          git push
          echo "✅ Rolled back GitOps repo to $PREV_SHA"
      - name: Trigger Render rollback (optional)
        if: vars.RENDER_ROLLBACK_HOOK != ''
        run: |
          echo "Triggering Render rollback..."
          curl -sf -X POST "${{ vars.RENDER_ROLLBACK_HOOK }}" || echo "⚠ Render rollback hook failed (non-fatal)"
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Rollback complete"
