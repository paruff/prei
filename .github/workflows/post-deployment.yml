name: Post-Deployment — Acceptance Pipeline

on:
  repository_dispatch:
    types: [deploy-complete]
  workflow_dispatch:
    inputs:
      url:
        description: "Deployment URL to validate"
        required: true
        default: "http://localhost:8000"

concurrency:
  group: post-deploy-${{ github.event.client_payload.url || inputs.url }}
  cancel-in-progress: false

jobs:
  # ── Fast pre-flight: basic HTTP reachability ──────────────────────────────

  smoke:
    name: "💨 Smoke Tests"
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.url.outputs.target }}
    steps:
      - name: Resolve target URL
        id: url
        run: |
          TARGET="${{ github.event.client_payload.url || inputs.url }}"
          TARGET="${TARGET%/}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Testing against: $TARGET"

      - name: Verify image signature
        if: github.event.client_payload.image != ''
        run: |
          echo "Verifying image signature..."
          gh attestation verify \
            "oci://${{ github.event.client_payload.image }}" \
            --repo "${{ github.repository }}" \
            || echo "::warning::Image signature verification skipped (provenance may not be available)"

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.target }}/health/")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: API — listings
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.target }}/api/listings/")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/listings/ returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /api/listings/ OK"

      - name: Summary
        if: always()
        run: |
          echo "── Smoke test complete ──"
          echo "  Target: ${{ steps.url.outputs.target }}"

  # ── HTTP-level content acceptance tests ───────────────────────────────────

  acceptance:
    name: "🧪 Acceptance Tests"
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/python-setup
      - name: Install dependencies
        run: pip install httpx beautifulsoup4 pytest -q
      - name: Run acceptance tests
        env:
          BASE_URL: ${{ needs.smoke.outputs.target }}
        run: |
          python -m pytest tests/acceptance/ -q --tb=short -v

  # ── Performance budgets via Lighthouse ────────────────────────────────────

  performance:
    name: "📈 Performance"
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.smoke.outputs.target }}/health/
            ${{ needs.smoke.outputs.target }}/discovery/
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ── DAST security scan ────────────────────────────────────────────────────

  security:
    name: "🛡️ Security Scan"
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v1
        with:
          target: ${{ needs.smoke.outputs.target }}
          allow_issue_writing: false
          fail_action: true
          cmd_options: "-a"
    timeout-minutes: 10

  # ── Rollback on any gate failure ──────────────────────────────────────────

  rollback:
    name: "🔄 Rollback on Failure"
    needs: [smoke, acceptance, performance, security]
    if: failure() && vars.GITOPS_REPO != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      GITOPS_MANIFEST_PATH: ${{ vars.GITOPS_MANIFEST_PATH || 'overlays/production/kustomization.yaml' }}
    steps:
      - name: "job-start"
        run: |
          echo "job-start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Rollback triggered — gate failure detected"
          echo "GitOps repo: ${{ env.GITOPS_REPO }}"
      - name: Checkout GitOps repo
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_DEPLOY_KEY || secrets.GITHUB_TOKEN }}
          path: gitops
      - name: Revert to previous commit
        working-directory: gitops
        run: |
          PREV_SHA=$(git rev-parse HEAD~1)
          if [ -z "$PREV_SHA" ]; then
            echo "::error::No previous commit to rollback to"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert --no-edit "$PREV_SHA..HEAD"
          git push
          echo "✅ Rolled back GitOps repo to $PREV_SHA"
      - name: Trigger Render rollback (optional)
        if: vars.RENDER_ROLLBACK_HOOK != ''
        run: |
          echo "Triggering Render rollback..."
          curl -sf -X POST "${{ vars.RENDER_ROLLBACK_HOOK }}" || echo "⚠ Render rollback hook failed (non-fatal)"
      - name: "job-finish"
        if: always()
        run: |
          echo "job-finish: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Rollback complete"

  # ── Notify uFawkesObs ──────────────────────────────────────────────────────

  notify:
    name: "📡 Deploy Notify"
    needs: [smoke, acceptance, performance, security]
    if: always() && vars.UFAWKES_WEBHOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Post to uFawkesObs
        run: |
          STATUS="success"
          if [ "${{ needs.smoke.result }}" != "success" ] || \
             [ "${{ needs.acceptance.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            STATUS="failure"
          fi
          curl -sf -X POST "${{ vars.UFAWKES_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"event\":\"deploy-complete\",\"repo\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"status\":\"${STATUS}\",\"url\":\"${{ needs.smoke.outputs.target }}\"}" \
            || echo "::warning::uFawkesObs webhook failed (non-fatal)"
