name: "Python Setup"
description: "Set up Python 3.12 with pip cache (run actions/checkout before invoking this action)"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: requirements.txt
    - name: Upgrade pip and setuptools
      run: pip install --upgrade pip "setuptools>=82"
      shell: bash
