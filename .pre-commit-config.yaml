# Pre-commit hooks to prevent CI/CD pipeline failures
# Install: pip install pre-commit && pre-commit install
# Run: pre-commit run --all-files

repos:
  # --- ruff: fast Python linter & formatter ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.6
    hooks:
      - id: ruff
        args: [--fix, --show-fixes]
      - id: ruff-format

  # --- mypy: static type checking ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs
          - djangorestframework-stubs
          - djangorestframework
          - psycopg2-binary
          - types-psycopg2
          - types-reportlab
          - django-environ
        args: [--show-error-codes, --no-incremental]
        exclude: ^migrations/
        verbose: true

  # --- GitOps validation (Dockerfile, docker-compose, K8s, Kustomize) ---
  - repo: local
    hooks:
      - id: gitops-validate
        name: GitOps validation
        entry: bash -c './scripts/gitops-validate.sh --files $@'
        language: system
        files: |
          (.*Dockerfile.*|.*docker-compose.*|.*\.k8s\.ya?ml$|.*kustomization\.ya?ml$|^manifests/|^overlays/)
        types: [file]
        pass_filenames: true

  # --- Secret scanning (gitleaks) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.1
    hooks:
      - id: gitleaks
        args: [--verbose]
        exclude: |
          (?x)^(
            .*/migrations/.*\.py$
          )$

  # --- Conventional commits ---
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.28.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # --- Python package validation (pyproject.toml if exists) ---
  - repo: https://github.com/pycqa/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-x, ".venv,migrations", -f, txt]
        exclude: ^migrations/
        pass_filenames: true

  # --- Check for merge conflicts ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]

  # --- Dockerfile linting ---
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: [--failure-threshold, error]
        files: Dockerfile

  # --- YAML check (separate to exclude mkdocs.yml which needs custom tags) ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^mkdocs\.yml$

  # --- Requirements.txt pinning check ---
  - repo: local
    hooks:
      - id: check-requirements-pinning
        name: Check requirements.txt pinning
        entry: bash scripts/check-requirements-pinning.sh
        language: system
        files: requirements.txt
        verbose: true

ci:
  autofix_commit_msg: |
    [pre-commit] auto fixes from ruff

    This commit was automatically generated by pre-commit hooks.
  autofix_prs: true
