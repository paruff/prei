# Pre-commit hooks to prevent CI/CD pipeline failures
# Install: pip install pre-commit && pre-commit install
# Run: pre-commit run --all-files
#
# When updating tool versions here, keep them in sync with:
#   - .github/workflows/ci-quality.yml (CI lint/test/typecheck)
#   - requirements.txt (pip-resolved versions)
#   - Makefile (local dev targets)
#
# To find the latest rev for a hook:
#   pre-commit autoupdate --repo https://github.com/<owner>/<repo>

repos:
  # --- ruff: fast Python linter & formatter ---
  # Version must match pip-resolved version from requirements.txt (ruff>=0.15.15)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --show-fixes]
      - id: ruff-format
        args: [--check]

  # --- mypy: static type checking ---
  # Version should match pip-resolved version from requirements.txt (mypy>=0.991)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0  # Must match pip-resolved version from requirements.txt
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs
          - djangorestframework-stubs
          - djangorestframework
          - psycopg2-binary
          - types-psycopg2
          - types-reportlab
          - django-environ
          - pydantic
          - fastapi
          - click
        args: [--show-error-codes, --no-incremental]
        exclude: ^migrations/|^tests_bdd/
        verbose: true

  # --- GitOps validation (Dockerfile, docker-compose, K8s, Kustomize) ---
  - repo: local
    hooks:
      - id: gitops-validate
        name: GitOps validation
        entry: bash -c './scripts/gitops-validate.sh --files $@'
        language: system
        files: |
          (.*Dockerfile.*|.*docker-compose.*|.*\.k8s\.ya?ml$|.*kustomization\.ya?ml$|^manifests/|^overlays/)
        types: [file]
        pass_filenames: true

  # --- Secret scanning (gitleaks) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.1
    hooks:
      - id: gitleaks
        args: [--verbose]
        exclude: |
          (?x)^(
            .*/migrations/.*\.py$
          )$

  # --- Conventional commits ---
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # --- Python security lint (bandit) ---
  - repo: https://github.com/pycqa/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-x, ".venv,migrations", -f, txt]
        exclude: ^migrations/
        pass_filenames: true

  # --- General-purpose file checks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: debug-statements              # catch stray print(), breakpoint(), pdb.set_trace()
      - id: check-case-conflict           # catch files differing only in case (macOS vs Linux)
      - id: detect-private-key            # catch accidentally committed private keys
      - id: mixed-line-ending             # enforce consistent line endings
        args: [--fix=lf]
      - id: name-tests-test               # enforce test_ prefix on test files
        args: [--django]
      - id: check-yaml
        exclude: ^mkdocs\.yml$

  # --- Dockerfile linting ---
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: [--failure-threshold, error]
        files: Dockerfile

  # --- Django template linting ---
  # Catches: inline styles (H021), hardcoded URLs (D018), unclosed tags, etc.
  # Silently ignores HTML entity references (H023), SEO meta suggestions (H030/H031),
  # and unnamed endblocks (T003) — these are style preferences, not bugs.
  - repo: https://github.com/djlint/djlint
    rev: v1.40.3
    hooks:
      - id: djlint
        args:
          - --quiet
          - --profile=django
          - --ignore=H023,H030,H031,T003
        files: \.html$

  # --- Requirements.txt pinning check ---
  - repo: local
    hooks:
      - id: check-requirements-pinning
        name: Check requirements.txt pinning
        entry: bash scripts/check-requirements-pinning.sh
        language: system
        files: requirements.txt
        verbose: true

ci:
  autofix_commit_msg: |
    [pre-commit] auto fixes from ruff

    This commit was automatically generated by pre-commit hooks.
  autofix_prs: true
