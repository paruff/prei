services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/paruff/prei:latest
    env_file: .env
    environment:
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      HOME: /app/.runtime
      MPLCONFIGDIR: /app/.runtime/matplotlib
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    ports: ["8000:8000"]
    # SQLite default — no external db service required.
    # Uncomment `depends_on` and the `db` service below for Postgres.
    # depends_on:
    #   db:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
        "import sys, urllib.request;\ntry: urllib.request.urlopen('http://localhost:8000/api/health/')\nexcept Exception as e: print(f'health check failed: {e}', file=sys.stderr); sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # Postgres is reserved for post-MVP production deployment.
  # Uncomment this block when switching from SQLite.
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-prei}
  #     POSTGRES_USER: ${POSTGRES_USER:-prei}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prei}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

# Uncomment when using Postgres above.
