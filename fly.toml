# fly.toml — Fly.io deployment configuration for prei
# Deploy: fly launch (first time) or fly deploy (subsequent)

app = "prei"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG = "False"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health/"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Set secrets via: fly secrets set SECRET_KEY=... DATABASE_URL=...
# Required secrets: SECRET_KEY, DATABASE_URL
